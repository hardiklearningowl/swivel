name: Build & Release Swivel CLI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      # ── 1. Checkout (with submodules for lib/format) ──────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Haxe 3.4.7 ─────────────────────────────────────────────────────
      - name: Setup Haxe 3.4.7
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 3.4.7

      - name: Install haxelib dependencies
        shell: pwsh
        run: |
          $env:HAXELIB_ROOT = "C:\haxelib"
          haxelib setup $env:HAXELIB_ROOT
          haxelib install air3

      # ── 3. Adobe AIR SDK 32.0 (last public build from Adobe) ──────────────
      - name: Download & extract Adobe AIR SDK 32.0
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $sdk = "C:\airsdk"
          if (-not (Test-Path "$sdk\bin\adt.bat")) {
            Write-Host "Downloading Adobe AIR Compiler SDK 32.0..."
            Invoke-WebRequest "https://fpdownload.macromedia.com/air/win/download/32.0/AIRSDK_Compiler.zip" -OutFile airsdk.zip
            Write-Host "Extracting..."
            Expand-Archive airsdk.zip -DestinationPath $sdk
            Remove-Item airsdk.zip
          }
          # Add adt to PATH for subsequent steps
          echo "$sdk\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "AIR SDK ready at $sdk"

      # ── 4. FFmpeg (bundled inside Swivel for its own video encoding) ───────
      - name: Download FFmpeg for Swivel bundling
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          New-Item -ItemType Directory -Force -Path ffmpeg/win32, ffmpeg/licenses | Out-Null
          Copy-Item ffmpeg_tmp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe ffmpeg/win32/ffmpeg.exe
          "FFmpeg - GPL v3 - https://ffmpeg.org/legal.html" | Out-File ffmpeg/licenses/LICENSE.txt -Encoding ascii
          Remove-Item -Recurse -Force ffmpeg_tmp, ffmpeg.zip
          Write-Host "FFmpeg bundled"

      # ── 5. Generate a self-signed code-signing certificate ────────────────
      - name: Generate certificate
        shell: pwsh
        run: |
          # bat/Swivel.p12 is not committed; generate a fresh one
          adt -certificate -cn "SwivelCLI" 1024-RSA bat/Swivel.p12 ngswivel!430
          Write-Host "Certificate generated"

      # ── 6. Compile SWF ────────────────────────────────────────────────────
      - name: Compile Swivel.swf
        shell: pwsh
        run: |
          $env:HAXELIB_ROOT = "C:\haxelib"
          haxe Swivel.hxml
          if (-not (Test-Path "bin/Swivel.swf")) { throw "Swivel.swf not produced" }
          Write-Host "Swivel.swf compiled OK ($(((Get-Item bin/Swivel.swf).Length / 1KB).ToString('N0')) KB)"

      # ── 7. Package captive-runtime bundle ─────────────────────────────────
      - name: Package AIR bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          adt -package `
            -storetype pkcs12 `
            -keystore bat/Swivel.p12 `
            -storepass "ngswivel!430" `
            -target bundle `
            bin/swivel-bundle `
            application.xml `
            bin/Swivel.swf `
            ffmpeg/win32 `
            ffmpeg/licenses `
            assets/icons `
            README.md `
            LICENSE.md
          if (-not (Test-Path "bin/swivel-bundle/swivel-cli.exe")) {
            Write-Host "Bundle contents:"
            Get-ChildItem -Recurse bin/ | Select-Object FullName
            throw "swivel-cli.exe not found in bundle"
          }
          Write-Host "Bundle created:"
          Get-ChildItem -Recurse bin/swivel-bundle | Select-Object Name, Length

      # ── 8. Zip bundle → swivel-cli-windows.zip ────────────────────────────
      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path bin/swivel-bundle -DestinationPath swivel-cli-windows.zip
          Write-Host "Archive size: $(((Get-Item swivel-cli-windows.zip).Length / 1MB).ToString('N1')) MB"

      # ── 9. Publish to GitHub Releases ─────────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: swivel-cli-windows.zip
          name: Swivel CLI ${{ github.ref_name }}
          body: |
            ## Swivel CLI ${{ github.ref_name }}

            Windows captive-runtime bundle for use with OwlConverter.

            **Included:**
            - `swivel-cli.exe` — SWF → raw MP4 renderer (Adobe AIR captive runtime)
            - Bundled FFmpeg for video encoding
            - Adobe AIR runtime (bundled, no installation required)

            This release is consumed automatically by OwlConverter's `fetch-binaries` script.
          generate_release_notes: false
